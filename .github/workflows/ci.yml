name: ci

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx eslint src --quiet
      - run: npx tsc --noEmit
      - run: npx vitest run --coverage

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: probook_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # playwright.config.ts loads .env.test (gitignored) — reconstruct it for CI.
      - name: Create .env.test
        run: |
          cat > .env.test <<'EOF'
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/probook_test?schema=public"
          DIRECT_URL="postgresql://postgres:postgres@localhost:5432/probook_test?schema=public"
          JWT_SECRET="ci-only-jwt-secret-not-used-anywhere-real-0123456789abcdef"
          NEXT_PUBLIC_APP_URL="http://localhost:3001"
          NEXT_PUBLIC_SITE_URL="http://localhost:3001"
          NEXT_PUBLIC_APP_NAME="Probook"
          EOF
      - name: Apply migrations to test DB
        run: npx dotenv -e .env.test -- npx prisma migrate deploy
      - run: npx playwright install --with-deps chromium
      - name: Run e2e suite
        run: npx dotenv -e .env.test -- npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
