name: ci

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # The Prisma client is generated into src/generated (gitignored) — without
      # this step, tsc fails on every file that imports it.
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
      - run: npx eslint src --quiet
      - run: npx tsc --noEmit
      - run: npx vitest run --coverage

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: probook_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # playwright.config.ts loads .env.test (gitignored) — reconstruct it for CI.
      # Supabase/Resend values are dummies: the e2e suite never reaches those
      # services, but the production boot-time env check requires them to exist.
      - name: Create .env.test
        run: |
          cat > .env.test <<'EOF'
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/probook_test?schema=public"
          DIRECT_URL="postgresql://postgres:postgres@localhost:5432/probook_test?schema=public"
          JWT_SECRET="ci-only-jwt-secret-not-used-anywhere-real-0123456789abcdef"
          NEXT_PUBLIC_APP_URL="http://localhost:3001"
          NEXT_PUBLIC_SITE_URL="http://localhost:3001"
          NEXT_PUBLIC_APP_NAME="Probook"
          NEXT_PUBLIC_SUPABASE_URL="https://ci-dummy.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY="ci-dummy-service-role-key"
          RESEND_API_KEY="re_ci_dummy_key"
          EMAIL_FROM="Probook CI <ci@example.invalid>"
          EOF
      - name: Apply migrations to test DB
        run: npx dotenv -e .env.test -- npx prisma migrate deploy
      # CI runs against a production build (playwright.config disables its
      # webServer when CI is set) — this also exercises the strict CSP.
      - name: Build app
        run: npx dotenv -e .env.test -- npm run build
      - name: Start app
        run: |
          npx dotenv -e .env.test -- npx next start -p 3001 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:3001 > /dev/null && break
            sleep 2
          done
      - run: npx playwright install --with-deps chromium
      - name: Run e2e suite
        run: npx dotenv -e .env.test -- npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
